<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Background wall -->
  <rect width="800" height="500" fill="#f0f4f8"/>

  <!-- Floor -->
  <rect x="0" y="380" width="800" height="120" fill="#d9c9a3"/>
  <!-- Floor planks -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="#c4b08a" stroke-width="1"/>
  <line x1="0" y1="420" x2="800" y2="420" stroke="#c4b08a" stroke-width="1"/>
  <line x1="0" y1="440" x2="800" y2="440" stroke="#c4b08a" stroke-width="1"/>
  <line x1="0" y1="460" x2="800" y2="460" stroke="#c4b08a" stroke-width="1"/>
  <line x1="200" y1="380" x2="200" y2="500" stroke="#c4b08a" stroke-width="1"/>
  <line x1="400" y1="380" x2="400" y2="500" stroke="#c4b08a" stroke-width="1"/>
  <line x1="600" y1="380" x2="600" y2="500" stroke="#c4b08a" stroke-width="1"/>

  <!-- Back wall baseboard -->
  <rect x="0" y="370" width="800" height="12" fill="#e0d5c0"/>

  <!-- Window -->
  <rect x="290" y="60" width="220" height="200" rx="4" fill="#b8d9f0"/>
  <rect x="290" y="60" width="220" height="200" rx="4" fill="none" stroke="#8ab4d4" stroke-width="6"/>
  <!-- Window frame cross -->
  <line x1="400" y1="60" x2="400" y2="260" stroke="#8ab4d4" stroke-width="4"/>
  <line x1="290" y1="160" x2="510" y2="160" stroke="#8ab4d4" stroke-width="4"/>
  <!-- Window reflection -->
  <rect x="300" y="70" width="90" height="80" fill="#d4ebf7" opacity="0.5"/>
  <!-- Curtains -->
  <path d="M270,50 Q285,160 275,270" fill="#c9d8e8" stroke="#aac0d4" stroke-width="2"/>
  <path d="M530,50 Q515,160 525,270" fill="#c9d8e8" stroke="#aac0d4" stroke-width="2"/>

  <!-- Sofa -->
  <rect x="80" y="300" width="300" height="80" rx="10" fill="#7ba7c9"/>
  <rect x="80" y="280" width="300" height="35" rx="8" fill="#5d8fba"/>
  <!-- Sofa cushions -->
  <rect x="90" y="305" width="90" height="65" rx="6" fill="#6d9cbf"/>
  <rect x="190" y="305" width="90" height="65" rx="6" fill="#6d9cbf"/>
  <rect x="290" y="305" width="80" height="65" rx="6" fill="#6d9cbf"/>
  <!-- Sofa legs -->
  <rect x="95" y="375" width="15" height="12" rx="3" fill="#4a7a9b"/>
  <rect x="355" y="375" width="15" height="12" rx="3" fill="#4a7a9b"/>
  <!-- Sofa left arm -->
  <rect x="68" y="282" width="18" height="90" rx="6" fill="#5d8fba"/>
  <!-- Sofa right arm -->
  <rect x="370" y="282" width="18" height="90" rx="6" fill="#5d8fba"/>

  <!-- Pillow on sofa -->
  <rect x="105" y="310" width="60" height="50" rx="8" fill="#ffffff" opacity="0.6"/>
  <rect x="200" y="310" width="60" height="50" rx="8" fill="#e8f4fb" opacity="0.7"/>

  <!-- Coffee table -->
  <rect x="150" y="362" width="160" height="18" rx="4" fill="#b0956e"/>
  <rect x="160" y="378" width="12" height="10" rx="2" fill="#967854"/>
  <rect x="286" y="378" width="12" height="10" rx="2" fill="#967854"/>
  <!-- Book on table -->
  <rect x="170" y="354" width="50" height="10" rx="2" fill="#e07050"/>

  <!-- Plant in corner -->
  <rect x="610" y="330" width="28" height="50" rx="4" fill="#c8a96e"/>
  <ellipse cx="624" cy="330" rx="50" ry="40" fill="#5a9e5a"/>
  <ellipse cx="600" cy="315" rx="30" ry="25" fill="#4d8f4d"/>
  <ellipse cx="648" cy="318" rx="28" ry="22" fill="#4d8f4d"/>
  <ellipse cx="624" cy="300" rx="22" ry="18" fill="#3d7e3d"/>

  <!-- TV on wall / picture frame -->
  <rect x="520" y="120" width="200" height="130" rx="6" fill="#2c3e50"/>
  <rect x="528" y="128" width="184" height="114" rx="4" fill="#1a252f"/>
  <!-- TV screen content -->
  <rect x="535" y="135" width="170" height="100" fill="#1e3a5f"/>
  <circle cx="620" cy="185" r="30" fill="#2980b9" opacity="0.4"/>
  <polygon points="608,172 608,198 636,185" fill="white" opacity="0.7"/>
  <!-- TV stand -->
  <rect x="600" y="250" width="40" height="8" rx="2" fill="#555"/>
  <rect x="590" y="258" width="60" height="6" rx="2" fill="#444"/>

  <!-- Floor lamp -->
  <rect x="490" y="200" width="6" height="180" fill="#888"/>
  <path d="M455,200 Q493,160 531,200" fill="#f0e68c" stroke="#d4c460" stroke-width="2"/>
  <circle cx="493" cy="198" r="6" fill="#ffe066"/>

  <!-- Cleaning sparkle effect -->
  <g opacity="0.7">
    <circle cx="700" cy="80" r="4" fill="#007BFF"/>
    <line x1="700" y1="68" x2="700" y2="76" stroke="#007BFF" stroke-width="2"/>
    <line x1="700" y1="84" x2="700" y2="92" stroke="#007BFF" stroke-width="2"/>
    <line x1="688" y1="80" x2="696" y2="80" stroke="#007BFF" stroke-width="2"/>
    <line x1="704" y1="80" x2="712" y2="80" stroke="#007BFF" stroke-width="2"/>
    <line x1="691" y1="71" x2="697" y2="77" stroke="#007BFF" stroke-width="2"/>
    <line x1="703" y1="83" x2="709" y2="89" stroke="#007BFF" stroke-width="2"/>
  </g>
  <g opacity="0.5">
    <circle cx="730" cy="110" r="3" fill="#007BFF"/>
    <line x1="730" y1="101" x2="730" y2="107" stroke="#007BFF" stroke-width="1.5"/>
    <line x1="730" y1="113" x2="730" y2="119" stroke="#007BFF" stroke-width="1.5"/>
    <line x1="721" y1="110" x2="727" y2="110" stroke="#007BFF" stroke-width="1.5"/>
    <line x1="733" y1="110" x2="739" y2="110" stroke="#007BFF" stroke-width="1.5"/>
  </g>

  <!-- Label -->
  <rect x="0" y="460" width="800" height="40" fill="rgba(0,123,255,0.08)"/>
  <text x="400" y="486" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#007BFF" font-weight="500">Профессиональная уборка квартир — КлинМастер</text>
</svg>
